<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team - Cmdr</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
        
        :root {
            --primary-orange: #FF6B00;
            --primary-yellow: #FFB800;
            --accent-gold: #FFA000;
            --dark-bg: #0a0a0a;
            --darker-bg: #050505;
            --card-bg: #141414;
            --text-primary: #ffffff;
            --text-secondary: #a8a8a8;
            --glow-orange: rgba(255, 107, 0, 0.6);
            --glow-yellow: rgba(255, 184, 0, 0.6);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 10% 20%, rgba(255, 107, 0, 0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 90% 80%, rgba(255, 184, 0, 0.15) 0%, transparent 40%);
            animation: backgroundPulse 20s ease-in-out infinite;
            z-index: 0;
        }
        
        @keyframes backgroundPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 107, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 0, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 3rem;
            position: relative;
            z-index: 1;
        }
        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 107, 0, 0.2);
            z-index: 1000;
            animation: slideDown 0.6s ease;
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
        }
        
        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logo:hover {
            filter: drop-shadow(0 0 20px var(--glow-orange));
        }
        
        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
            transition: width 0.3s ease;
        }
        
        .nav-links a:hover {
            color: var(--text-primary);
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        .page-header {
            padding: 150px 0 80px;
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }
        
        .page-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3.5rem, 8vw, 6rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-orange), var(--primary-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            animation: titlePulse 2s ease-in-out infinite, gradientMove 5s ease infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px var(--glow-orange));
            }
            50% {
                transform: scale(1.02);
                filter: drop-shadow(0 0 40px var(--glow-yellow));
            }
        }
        
        @keyframes gradientMove {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        
        .team-section {
            padding: 4rem 0 8rem;
        }
        
        .team-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4rem;
            margin-top: 4rem;
        }
        
        .team-member {
            position: relative;
            text-align: center;
            animation: fadeInUp 0.8s ease both;
        }
        
        .team-member:nth-child(1) { animation-delay: 0.1s; }
        .team-member:nth-child(2) { animation-delay: 0.2s; }
        .team-member:nth-child(3) { animation-delay: 0.3s; }
        .team-member:nth-child(4) { animation-delay: 0.4s; }
        .team-member:nth-child(5) { animation-delay: 0.5s; }
        
        .avatar-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 2.5rem;
            cursor: pointer;
        }
        
        .orbital-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                var(--primary-orange),
                var(--primary-yellow),
                var(--accent-gold),
                var(--primary-orange)
            );
            animation: rotate 4s linear infinite;
            filter: blur(8px);
            opacity: 0.8;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .avatar-container::after {
            content: '';
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(255, 107, 0, 0.4),
                rgba(255, 184, 0, 0.4),
                transparent
            );
            filter: blur(30px);
            animation: pulse 3s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes pulse {
            0%, 100% { 
                opacity: 0.6;
                transform: scale(1);
            }
            50% { 
                opacity: 1;
                transform: scale(1.1);
            }
        }
        
        .avatar-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--dark-bg);
            padding: 6px;
            z-index: 1;
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--dark-bg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .team-member:hover .avatar {
            transform: scale(1.08);
        }
        
        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            border: 3px solid var(--dark-bg);
            filter: drop-shadow(0 0 20px var(--glow-orange));
        }
        
        .member-name {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            background: linear-gradient(
                135deg,
                var(--primary-orange) 0%,
                var(--primary-yellow) 50%,
                var(--accent-gold) 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: gradientFlow 5s ease infinite;
            margin-bottom: 0.8rem;
            text-transform: uppercase;
        }
        
        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .member-role {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }
        
        .member-role::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-orange), var(--primary-yellow));
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        footer {
            background: var(--darker-bg);
            border-top: 1px solid rgba(255, 107, 0, 0.2);
            padding: 3rem 0;
            text-align: center;
        }
        
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 3rem;
            flex-wrap: wrap;
            gap: 2rem;
        }
        
        footer p {
            color: var(--text-secondary);
            font-size: 1rem;
            letter-spacing: 0.05em;
        }
        
        .footer-links {
            display: flex;
            gap: 2rem;
        }
        
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .footer-links a:hover {
            color: var(--primary-yellow);
        }
        
        @media (max-width: 1200px) {
            .team-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 0 1.5rem;
            }
            
            nav .container {
                padding: 1rem 1.5rem;
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-links {
                gap: 1.5rem;
            }
            
            .team-grid {
                grid-template-columns: 1fr;
                gap: 5rem;
            }
            
            .avatar-container {
                width: 180px;
                height: 180px;
            }
            
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
            
            .footer-links {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
